server {
    listen 80;
    server_name _; # Listen on any hostname

    # Root directory for serving static files
    root   /usr/share/nginx/html;
    index  index.html index.htm; # Default index files

    # Try files for Single Page Applications (SPA) routing
    # This ensures that if a URL like /about is requested, it serves index.html
    # so your React app can handle the routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service
    location /api/ {
        # 'backend' is the 'name' of your backend service in railway.json
        # '3000' is the port your backend exposes (from EXPOSE in its Dockerfile)
        proxy_pass http://backend.railway.internal:8080/;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Error pages (optional, but good practice)
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}