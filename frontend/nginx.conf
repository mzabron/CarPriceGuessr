server {
    listen 80;
    server_name _; # Listen on all hostnames

    root /usr/share/nginx/html; # Root directory for your static files

    index index.html index.htm; # Default file to serve

    # This is critical for SPAs: try to serve the requested file,
    # if it doesn't exist, fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: If your frontend makes API calls to your backend using a relative path like /api
    # Example: Frontend fetches from '/api/data'
    # This location block will proxy those requests to your backend service on Railway
    location /api/ {
        # Use Railway's internal service name for the backend
        # Replace 'backend' with the actual 'name' you gave your backend service in railway.json
        # Replace '3000' with the port your Node.js backend listens on
        proxy_pass http://backend.railway.internal:8080/; # Railway provides internal DNS resolution

        # Important headers to forward to your backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Error handling for Nginx
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}